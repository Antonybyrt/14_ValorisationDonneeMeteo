name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "24"

jobs:
  # ──────────────────────────────────────────────────
  # JOB 1 — Backend: lint, test, security scan
  # ──────────────────────────────────────────────────
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Run tests with coverage
        run: |
          mkdir -p ../test-results
          uv run pytest \
            --junitxml=../test-results/backend-junit.xml \
            --cov=. \
            --cov-report=xml:../test-results/backend-coverage.xml \
            --cov-report=term-missing
        env:
          SECRET_KEY: "ci-insecure-key-not-used-in-production"
          DJANGO_SETTINGS_MODULE: config.settings

      - name: Bandit security scan
        run: |
          uv run bandit -r weather config \
            --exclude weather/tests,weather/migrations \
            -f json -o ../test-results/bandit-report.json \
            --skip B101 || true

      - name: Upload backend test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: test-results/
          retention-days: 30

  # ──────────────────────────────────────────────────
  # JOB 2 — Frontend: lint, test, audit
  # ──────────────────────────────────────────────────
  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        # postinstall runs `nuxt prepare` which generates .nuxt/eslint.config.mjs

      - name: ESLint
        run: npx eslint --ext .js,.ts,.vue .

      - name: Prettier check
        run: npx prettier --check "**/*.{js,ts,vue,css,json,html}"

      - name: Run unit tests
        run: |
          mkdir -p ../test-results
          npm run test:unit

      - name: npm audit
        run: npm audit --audit-level=critical

      - name: Upload frontend test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-results
          path: test-results/
          retention-days: 30

  # ──────────────────────────────────────────────────
  # JOB 3 — Build Docker images
  # ──────────────────────────────────────────────────
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-24.04
    needs: [backend-ci, frontend-ci]
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Lowercase repo name
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          load: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          load: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save image tarballs
        run: |
          docker save "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:${{ github.sha }}" \
            | gzip > /tmp/backend-image.tar.gz
          docker save "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:${{ github.sha }}" \
            | gzip > /tmp/frontend-image.tar.gz

      - name: Upload image tarballs
        uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: /tmp/*.tar.gz
          retention-days: 1

  # ──────────────────────────────────────────────────
  # JOB 4 — Push to GHCR (main branch only)
  # ──────────────────────────────────────────────────
  push-registry:
    name: Push to Registry
    runs-on: ubuntu-24.04
    needs: [build-images]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Lowercase repo name
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:latest
          cache-from: type=gha

      - name: Push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:latest
          cache-from: type=gha

  # ──────────────────────────────────────────────────
  # JOB 5 — Trivy container security scan
  # ──────────────────────────────────────────────────
  trivy-scan:
    name: Trivy Security Scan
    runs-on: ubuntu-24.04
    needs: [build-images]
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Download image tarballs
        uses: actions/download-artifact@v4
        with:
          name: docker-images
          path: /tmp/

      - name: Load Docker images
        run: |
          docker load < /tmp/backend-image.tar.gz
          docker load < /tmp/frontend-image.tar.gz

      - name: Lowercase repo name
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Trivy scan — backend (SARIF)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:${{ github.sha }}
          format: sarif
          output: trivy-backend.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"

      - name: Trivy scan — frontend (SARIF)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:${{ github.sha }}
          format: sarif
          output: trivy-frontend.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"

      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "."

      - name: Upload SARIF as artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif-reports
          path: "*.sarif"
          retention-days: 30
